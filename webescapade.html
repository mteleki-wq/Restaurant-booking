<script>
  const WEBHOOK_URL = "https://trainerapex.app.n8n.cloud/webhook/restaurant-booking-online";

  const form = document.getElementById("bookingForm");
  const submitBtn = document.getElementById("submitBtn");
  const successMessage = document.getElementById("successMessage");
  const errorMessage = document.getElementById("errorMessage");

  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");
  document.getElementById("date").min = `${yyyy}-${mm}-${dd}`;

  function showSuccess(message) {
    successMessage.textContent = message;
    successMessage.classList.add("show");
    errorMessage.classList.remove("show");
    errorMessage.textContent = "";
  }

  function showError(message) {
    errorMessage.textContent = message;
    errorMessage.classList.add("show");
    successMessage.classList.remove("show");
    successMessage.textContent = "";
  }

  function formatStart(dateValue, timeValue) {
    const local = new Date(`${dateValue}T${timeValue}:00`);
    const tzOffsetMin = -local.getTimezoneOffset();
    const sign = tzOffsetMin >= 0 ? "+" : "-";
    const abs = Math.abs(tzOffsetMin);
    const hh = String(Math.floor(abs / 60)).padStart(2, "0");
    const mm = String(abs % 60).padStart(2, "0");

    const year = local.getFullYear();
    const month = String(local.getMonth() + 1).padStart(2, "0");
    const day = String(local.getDate()).padStart(2, "0");
    const hours = String(local.getHours()).padStart(2, "0");
    const minutes = String(local.getMinutes()).padStart(2, "0");
    const seconds = String(local.getSeconds()).padStart(2, "0");

    return `${year}-${month}-${day}T${hours}:${minutes}:${seconds}${sign}${hh}:${mm}`;
  }

  function isWithinOpeningHours(timeValue) {
    if (!timeValue) return false;
    const parts = timeValue.split(":").map(Number);
    const total = parts[0] * 60 + parts[1];

    const lunchStart = 12 * 60;
    const lunchEnd = 14 * 60;
    const dinnerStart = 18 * 60;
    const dinnerEnd = 22 * 60;

    return (total >= lunchStart && total < lunchEnd) || (total >= dinnerStart && total < dinnerEnd);
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();

    if (
      !WEBHOOK_URL ||
      WEBHOOK_URL.includes("YOUR_N8N_PRODUCTION_WEBHOOK_URL_HERE") ||
      WEBHOOK_URL.includes("/webhook-test/")
    ) {
      showError("Please add your real n8n production webhook URL in the HTML first.");
      return;
    }

    const formData = new FormData(form);
    const date = formData.get("date");
    const time = formData.get("time");

    if (!isWithinOpeningHours(time)) {
      showError("Please choose a booking time within opening hours: 12:00 pm–2:00 pm or 6:00 pm–10:00 pm.");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    const payload = {
      name: String(formData.get("name") || "").trim(),
      phone: String(formData.get("phone") || "").trim(),
      email: String(formData.get("email") || "").trim(),
      partySize: Number(formData.get("partySize")),
      start: formatStart(date, time),
      source: "online",
      notes: String(formData.get("notes") || "").trim()
    };

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const text = await response.text();
      let result = {};

      try {
        result = text ? JSON.parse(text) : {};
      } catch {
        throw new Error("The booking service did not return valid JSON.");
      }

      if (!response.ok) {
        showError(result.message || result.error || `Server error (${response.status})`);
      } else if (result.success === false) {
        showError(result.message || "Booking was rejected by the booking workflow.");
      } else {
        const summaryText = result.summary ? `\nBooking: ${result.summary}` : "";
        const startText = result.start ? `\nTime: ${result.start}` : "";
        const linkText = result.calendarLink ? `\nLink: ${result.calendarLink}` : "";
        showSuccess(`Booking confirmed.${summaryText}${startText}${linkText}`);
        form.reset();
      }
    } catch (error) {
      showError("Could not reach the booking service. " + (error?.message || ""));
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Request booking";
    }
  });
</script>
