<script>
  const WEBHOOK_URL = "https://trainerapex.app.n8n.cloud/webhook/restaurant-booking-online";

  const form = document.getElementById("bookingForm");
  const submitBtn = document.getElementById("submitBtn");
  const successMessage = document.getElementById("successMessage");
  const errorMessage = document.getElementById("errorMessage");

  const nameInput = document.getElementById("name");
  const phoneInput = document.getElementById("phone");
  const emailInput = document.getElementById("email");
  const partySizeInput = document.getElementById("partySize");
  const dateInput = document.getElementById("date");
  const timeInput = document.getElementById("time");
  const notesInput = document.getElementById("notes");

  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");
  dateInput.min = `${yyyy}-${mm}-${dd}`;

  function showSuccess(message) {
    successMessage.textContent = message;
    successMessage.classList.add("show");
    errorMessage.classList.remove("show");
    errorMessage.textContent = "";
  }

  function showError(message) {
    errorMessage.textContent = message;
    errorMessage.classList.add("show");
    successMessage.classList.remove("show");
    successMessage.textContent = "";
  }

  function clearMessages() {
    successMessage.classList.remove("show");
    errorMessage.classList.remove("show");
    successMessage.textContent = "";
    errorMessage.textContent = "";
  }

  function formatStart(dateValue, timeValue) {
    const local = new Date(`${dateValue}T${timeValue}:00`);
    const tzOffsetMin = -local.getTimezoneOffset();
    const sign = tzOffsetMin >= 0 ? "+" : "-";
    const abs = Math.abs(tzOffsetMin);
    const hh = String(Math.floor(abs / 60)).padStart(2, "0");
    const mm = String(abs % 60).padStart(2, "0");

    const year = local.getFullYear();
    const month = String(local.getMonth() + 1).padStart(2, "0");
    const day = String(local.getDate()).padStart(2, "0");
    const hours = String(local.getHours()).padStart(2, "0");
    const minutes = String(local.getMinutes()).padStart(2, "0");
    const seconds = String(local.getSeconds()).padStart(2, "0");

    return `${year}-${month}-${day}T${hours}:${minutes}:${seconds}${sign}${hh}:${mm}`;
  }

  function isWithinOpeningHours(timeValue) {
    if (!timeValue) return false;
    const parts = timeValue.split(":").map(Number);
    const total = parts[0] * 60 + parts[1];

    const lunchStart = 12 * 60;
    const lunchEnd = 14 * 60;
    const dinnerStart = 18 * 60;
    const dinnerEnd = 22 * 60;

    return (total >= lunchStart && total < lunchEnd) || (total >= dinnerStart && total < dinnerEnd);
  }

  function validateForm() {
    if (
      !WEBHOOK_URL ||
      WEBHOOK_URL.includes("YOUR_N8N_PRODUCTION_WEBHOOK_URL_HERE") ||
      WEBHOOK_URL.includes("/webhook-test/")
    ) {
      showError("Please add your real n8n production webhook URL in the HTML first.");
      return false;
    }

    if (!nameInput.value.trim()) {
      showError("Please enter your full name.");
      return false;
    }

    if (!phoneInput.value.trim()) {
      showError("Please enter your phone number.");
      return false;
    }

    if (!emailInput.value.trim()) {
      showError("Please enter your email address.");
      return false;
    }

    if (!partySizeInput.value) {
      showError("Please select the number of guests.");
      return false;
    }

    if (!dateInput.value) {
      showError("Please choose a booking date.");
      return false;
    }

    if (!timeInput.value) {
      showError("Please choose a booking time.");
      return false;
    }

    if (!isWithinOpeningHours(timeInput.value)) {
      showError("Please choose a booking time within opening hours: 12:00 pm–2:00 pm or 6:00 pm–10:00 pm.");
      return false;
    }

    return true;
  }

  submitBtn.addEventListener("click", async function () {
    clearMessages();

    if (!validateForm()) {
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    const payload = {
      name: nameInput.value.trim(),
      phone: phoneInput.value.trim(),
      email: emailInput.value.trim(),
      partySize: Number(partySizeInput.value),
      start: formatStart(dateInput.value, timeInput.value),
      source: "online",
      notes: notesInput.value.trim()
    };

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const text = await response.text();
      let result = {};

      try {
        result = text ? JSON.parse(text) : {};
      } catch (e) {
        showError("The booking service returned an invalid response.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Request booking";
        return;
      }

      if (!response.ok) {
        showError(result.message || result.error || `Server error (${response.status})`);
      } else if (result.success === false) {
        showError(result.message || "Booking was rejected by the booking workflow.");
      } else {
        const summaryText = result.summary ? `\nBooking: ${result.summary}` : "";
        const startText = result.start ? `\nTime: ${result.start}` : "";
        const linkText = result.calendarLink ? `\nLink: ${result.calendarLink}` : "";
        showSuccess(`Booking confirmed.${summaryText}${startText}${linkText}`);
        form.reset();
      }
    } catch (error) {
      showError("Could not reach the booking service. " + (error && error.message ? error.message : ""));
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Request booking";
    }
  });
</script>
