<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chefs Goutatoo Genève</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:wght@700&display=swap">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Cormorant Garamond',serif;background:#f5f0e8}a,button{cursor:pointer}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#c9a96e44}
nav{background:#111;height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}.nl{display:flex;align-items:center;gap:8px}.li{width:32px;height:32px;background:#c9a96e;border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:14px}.li img{width:100%;height:100%;object-fit:cover}.bn{color:#c9a96e;font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700}.nk{display:flex;gap:18px}.nk a{color:#777;font-size:10px;letter-spacing:.06em;text-decoration:none}.nk a:hover,.nk a.on{color:#c9a96e}
.acci{border:1px solid rgba(201,169,110,.2);border-radius:2px;margin-bottom:9px;overflow:hidden}.accb{width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:none;border:none;cursor:pointer;font-family:'Cormorant Garamond',serif;color:#2c1a0a;font-size:15px}.acci.open{background:rgba(201,169,110,.03)}.acbb{display:none;padding:0 18px 18px}.ap{color:#c9a96e;font-size:16px;transition:transform .3s}
footer{background:#111;padding:20px 32px;text-align:center}.fn{color:#c9a96e;font-family:'Cormorant Garamond',serif;font-size:14px;margin-bottom:4px}.fc{color:#555;font-size:9px;font-family:system-ui;letter-spacing:.1em}
</style>
</head><body>
<nav><div class="nl"><div class="li">'+( G.siteLogo?'<img src="'+G.siteLogo+'">' : '🍴')+'</div><a class="bn" onclick="go('home')">Chefs Goutatoo Genève</a></div><div class="nk"><a onclick="go('home')" id="lh">Accueil</a><a onclick="go('chefs')" id="lc">Les Chefs</a><a onclick="go('chefs')">Recettes</a><a onclick="go('home')">Contact</a></div></nav>
<div id="root"></div>
<footer><div class="fn">Chefs Goutatoo Genève</div><div class="fc">© 2025 · Pour le bon goût</div></footer>
<script>
var D='+jd+';
var chefs=D.chefs,G=D.globalData||{};
function e(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function go(p,id){var lh=document.getElementById('lh'),lc=document.getElementById('lc');if(lh)lh.className=p==='home'?'on':'';if(lc)lc.className=p==='chefs'||p==='chef'?'on':'';window.scrollTo(0,0);if(p==='home')rHome();else if(p==='chefs')rChefs();else rChef(id);location.hash=p==='chef'?'c'+id:p;}
function rHome(){var h=G.heroImage?'<div style="position:relative;height:400px;overflow:hidden"><img src="'+G.heroImage+'" style="width:100%;height:100%;object-fit:cover"><div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1),rgba(0,0,0,.6))"></div><div style="position:absolute;bottom:0;left:0;right:0;padding:40px;text-align:center"><h1 style="font-family:Playfair Display,serif;font-size:40px;color:#fff;margin:0 0 10px">'+e(G.homeTitle)+'</h1><p style="font-size:14px;color:rgba(255,255,255,.85);font-style:italic">'+e(G.homeSub)+'</p></div></div>':'<div style="background:linear-gradient(135deg,#1a2744,#2c3e50);height:260px;display:flex;align-items:center;justify-content:center"><h1 style="font-family:Playfair Display,serif;font-size:38px;color:#fff">'+e(G.homeTitle)+'</h1></div>';var cards=chefs.map(function(c){return'<a onclick="go(\'chef\',\''+c.id+'\');" style="text-align:center;text-decoration:none;display:block"><div style="width:100%;aspect-ratio:3/4;background:#e8e4dc;overflow:hidden;border-radius:2px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;font-size:40px;opacity:.2">'+( c.portrait?'<img src="'+c.portrait+'" style="width:100%;height:100%;object-fit:cover;opacity:1">':\'👨‍🍳')+'</div><div style="font-family:Cormorant Garamond,serif;font-size:14px;color:#1a2744;font-weight:600">'+e(c.name)+'</div><div style="font-size:10px;color:#9a8060">'+e(c.restaurant)+'</div></a>';}).join('');document.getElementById('root').innerHTML=h+'<div style="background:#f0ebe0;border-top:2px solid #c9a96e;border-bottom:2px solid #c9a96e;padding:14px 32px;text-align:center"><p style="font-size:14px;color:#5a4030;font-style:italic">'+e(G.homeTagline||'')+'</p></div><div style="padding:40px 32px"><div style="text-align:center;margin-bottom:28px"><h2 style="font-family:Playfair Display,serif;font-size:28px;color:#1a2744;margin:0 0 12px">Les Chefs</h2></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:18px">'+cards+'</div></div>';}
function rChefs(){var cards=chefs.map(function(c){return'<a onclick="go(\'chef\',\''+c.id+'\');" style="background:#fff;border:1px solid rgba(201,169,110,.2);border-radius:3px;overflow:hidden;text-decoration:none;display:block;box-shadow:0 2px 10px rgba(0,0,0,.04)"><div style="height:180px;background:#e8e4dc;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:48px;opacity:.2">'+( c.portrait?'<img src="'+c.portrait+'" style="width:100%;height:100%;object-fit:cover;opacity:1">':\'👨‍🍳')+'</div><div style="padding:14px"><div style="font-size:8px;color:#c9a96e;letter-spacing:.15em;text-transform:uppercase;margin-bottom:3px;font-family:system-ui">'+e(c.position)+'</div><div style="font-family:Cormorant Garamond,serif;font-size:17px;font-weight:700;color:#1a2744;margin-bottom:2px">'+e(c.name)+'</div><div style="font-size:11px;color:#9a8060;margin-bottom:8px">'+e(c.restaurant)+'</div><div style="font-size:11px;color:#c9a96e;font-family:system-ui">Voir le profil →</div></div></a>';}).join('');document.getElementById('root').innerHTML='<div style="padding:40px 28px"><div style="text-align:center;margin-bottom:32px"><h1 style="font-family:Playfair Display,serif;font-size:32px;color:#1a2744;margin:0 0 12px">Notre Équipe</h1><p style="font-size:13px;color:#7a6050;font-style:italic">Nous formons une équipe de cuisiniers liés par l\\'amour de la bonne cuisine.</p></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px">'+cards+'</div></div>';}
function rChef(id){var c=chefs.find(function(x){return String(x.id)===String(id);})||chefs[0];if(!c)return;var g='#c9a96e',n='#1a2744';var aw=(c.awards||[]).map(function(a,i,arr){return'<div style="flex:1 1 140px;padding:10px 14px;border-right:'+( i<arr.length-1?'1px solid rgba(201,169,110,.2)':\'none')+';text-align:center"><div style="color:'+g+';font-size:13px;margin-bottom:5px">✦</div><div style="font-size:8px;color:#9a8060;letter-spacing:.1em;text-transform:uppercase;line-height:1.4;font-family:system-ui">'+e(a)+'</div></div>';}).join('');var tl=(c.timeline||[]).map(function(t){return'<div style="display:flex;gap:14px;margin-bottom:12px;align-items:flex-start"><div style="min-width:40px;text-align:right;color:'+g+';font-size:11px;font-weight:700;font-family:system-ui;padding-top:2px">'+e(t.year)+'</div><div style="width:7px;height:7px;border-radius:50%;background:'+g+';margin-top:5px;flex-shrink:0;margin-left:-4px;position:relative;z-index:1"></div><div style="font-size:13px;color:#2c2c2c">'+e(t.event)+'</div></div>';}).join('');var recs=(c.recipes||[]).map(function(r){var ing=(r.ingredients||[]).filter(Boolean).map(function(i){return'<li style="font-size:12px;color:#5a4030;padding:4px 0;border-bottom:1px solid rgba(201,169,110,.1)">'+e(i)+'</li>';}).join('');var stp=(r.method||[]).filter(Boolean).map(function(s,i){return'<div style="display:flex;gap:8px;margin-bottom:8px"><span style="color:'+g+';font-size:14px;font-weight:700;min-width:18px">'+( i+1)+'</span><p style="font-size:12px;color:#5a4030;line-height:1.5;margin:0">'+e(s)+'</p></div>';}).join('');return'<div class="acci"><button class="accb" onclick="ta(this)"><span>'+e(r.title)+'</span><span style="display:flex;align-items:center;gap:10px"><span style="font-size:9px;color:#9a8060;font-family:system-ui">'+e(r.prepTime)+' · '+e(r.difficulty)+'</span><span class="ap">+</span></span></button><div class="acbb">'+( r.image?'<img src="'+r.image+'" style="width:100%;height:200px;object-fit:cover;border-radius:2px;margin-bottom:14px">':\'')+'<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px"><div><b style="font-size:10px;color:'+g+';letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:8px;font-family:system-ui">Ingrédients</b><ul style="list-style:none">'+ing+'</ul></div><div><b style="font-size:10px;color:'+g+';letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:8px;font-family:system-ui">Préparation</b>'+stp+'</div></div>'+( r.chefNotes?'<div style="margin-top:14px;padding:12px 16px;background:rgba(201,169,110,.05);border-left:3px solid '+g+'"><p style="font-size:12px;color:#5a4030;font-style:italic;line-height:1.7">'+e(r.chefNotes)+'</p></div>':\'')+( r.winepairing?'<div style="margin-top:10px;display:flex;align-items:center;gap:8px"><span>🍷</span><span style="font-size:12px;color:#5a4030;font-style:italic">'+e(r.winepairing)+'</span></div>':\'')+'</div></div>';}).join('');document.getElementById('root').innerHTML='<div style="font-family:Cormorant Garamond,serif;background:#f5f0e8"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;height:280px;border-bottom:3px solid '+g+'"><div style="background:#e8e4dc;overflow:hidden">'+( c.portrait?'<img src="'+c.portrait+'" style="width:100%;height:100%;object-fit:cover">':\'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:56px;opacity:.2">👨‍🍳</div>')+'</div><div style="background:#f5f0e8;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;border-left:1px solid rgba(201,169,110,.3);border-right:1px solid rgba(201,169,110,.3)">'+( c.restaurantLogo?'<img src="'+c.restaurantLogo+'" style="max-width:80%;max-height:90px;object-fit:contain;margin-bottom:14px">':\'<div style="font-size:18px;color:'+n+';font-weight:700;text-align:center;margin-bottom:14px">'+e(c.restaurant)+'</div>')+'<div style="color:'+g+';font-size:18px">✦</div><div style="width:50px;height:1px;background:'+g+';margin:10px 0"></div><div style="font-size:9px;color:#9a8060;letter-spacing:.2em;text-transform:uppercase;font-family:system-ui">Genève · Suisse</div></div><div style="background:#ccc;overflow:hidden">'+( c.restaurantPhoto?'<img src="'+c.restaurantPhoto+'" style="width:100%;height:100%;object-fit:cover">':\'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#d5d0c8;font-size:40px;opacity:.2">🏛</div>')+'</div></div><div style="text-align:center;padding:32px 28px 16px;border-bottom:1px solid rgba(201,169,110,.2)"><div style="font-size:9px;color:'+g+';letter-spacing:.3em;text-transform:uppercase;margin-bottom:7px;font-family:system-ui">Chef</div><h1 style="font-family:Playfair Display,serif;font-size:36px;font-weight:700;color:'+n+';margin:0 0 12px">'+e(c.name)+'</h1></div><div style="display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid rgba(201,169,110,.2)"><div style="padding:24px 28px;border-right:1px solid rgba(201,169,110,.2)"><div style="font-size:30px;color:'+g+';line-height:1;margin-bottom:5px;font-family:Georgia,serif">"</div><p style="font-size:16px;font-style:italic;color:'+n+';line-height:1.5">'+e(c.philosophy)+'</p></div><div style="padding:24px 28px"><p style="font-size:13px;color:#5a4030;line-height:1.7">'+e(c.biography)+'</p></div></div>'+( aw?'<div style="padding:20px 28px;border-bottom:1px solid rgba(201,169,110,.2);display:flex;flex-wrap:wrap">'+aw+'</div>':\'')+( tl?'<div style="padding:24px 28px;border-bottom:1px solid rgba(201,169,110,.2)"><div style="font-size:9px;color:'+g+';letter-spacing:.2em;text-transform:uppercase;margin-bottom:16px;font-family:system-ui">Parcours</div><div style="position:relative;padding-left:64px"><div style="position:absolute;left:48px;top:0;bottom:0;width:1px;background:rgba(201,169,110,.3)">'+( '</div>')+tl+'</div></div>':\'')+( recs?'<div style="padding:24px 28px;border-bottom:1px solid rgba(201,169,110,.2)"><div style="text-align:center;margin-bottom:18px"><div style="font-size:9px;color:'+g+';letter-spacing:.2em;text-transform:uppercase;margin-bottom:5px;font-family:system-ui">Recettes Signatures</div></div>'+recs+'</div>':\'')+'<div style="padding:14px 28px;text-align:center;font-size:9px;color:#9a8060;font-family:system-ui;letter-spacing:.1em">'+e(c.restaurant)+' · Genève · Suisse</div></div>';setTimeout(function(){document.querySelectorAll('.acci').forEach(function(item){var b=item.querySelector('.acbb');if(b)b.style.display='none';});},0);}
function ta(btn){var item=btn.parentElement;document.querySelectorAll('.acci.open').forEach(function(o){if(o!==item){o.classList.remove('open');var b=o.querySelector('.acbb');if(b)b.style.display='none';var p=o.querySelector('.ap');if(p)p.style.transform='none';}});var op=item.classList.toggle('open');var bd=item.querySelector('.acbb');if(bd)bd.style.display=op?'block':'none';var pl=item.querySelector('.ap');if(pl)pl.style.transform=op?'rotate(45deg)':'none';}
window.addEventListener('hashchange',function(){var h=location.hash.slice(1);if(h[0]==='c'&&h.length>1)go('chef',h.slice(1));else if(h==='chefs')go('chefs');else go('home');});
go('home');
</script>
</body></html>
